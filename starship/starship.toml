# ~/.config/starship.toml
# Starship prompt configuration with a "linked-data-dark-rainbow" palette.
# Modern three-line prompt with powerline segments, icons, and contextual info.

"$schema" = 'https://starship.rs/config-schema.json'

# ── Prompt Layout ────────────────────────────────────────────
# Powerline-styled top line with username, path, Git, languages, and time.
# Bottom line shows prompt symbol (character) for command entry.
format = """
╭─[](blue)\
[](bg:blue fg:black)\
${custom.pretty_name}\
[](bg:white fg:blue)\
[](bg:green fg:white)\
$directory\
[](bg:yellow fg:green)\
$git_branch\
$git_status\
[](fg:yellow bg:orange)\
$c\
$golang\
$haskell\
$java\
$kotlin\
$nodejs\
$php\
$python\
$rust\
[](fg:orange bg:red)\
[](fg:red bg:cyan)\
${custom.docker_running}\
[](fg:cyan bg:purple)\
$time\
$cmd_duration\
[](fg:purple)\
$line_break\
│
╰──$character"""

# Selected color palette
palette = 'linked_data_dark_rainbow'

# ── Custom: Pretty Name ───────────────────────────────────────
[custom.pretty_name]
command = "id -F | awk '{print $1}'" # First name from the full system username
when = "test $(uname) = Darwin"
style = "bg:blue fg:black"
format = "[ $output ]($style)"

# ── Custom: Docker Running Containers ─────────────────────────
[custom.docker_running]
command = "docker ps -q 2>/dev/null | wc -l | tr -d ' '"
when = "command -v docker >/dev/null"
symbol = " "
style = "fg:black bg:cyan"
format = "[ $symbol$output ]($style)"

# ── Directory ────────────────────────────────────────────────
[directory]
style = "bg:green fg:black"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "…/"
truncate_to_repo = true

[directory.substitutions] # Replaces folder names with icons
"Applications" = "󰀻 "
"Desktop" = " "
"Documents" = "󰈙 "
"Downloads" = " "
"Library" = " "
"Movies" = "󰎁 "
"Music" = "󰝚 "
"Pictures" = " "
"Projects" = "󰲋 "

# ── Git ──────────────────────────────────────────────────────
[git_branch]
symbol = ""
style = "fg:black bg:yellow"
format = '[ $symbol $branch ]($style)'

[git_status]
style = "fg:black bg:yellow"
format = '[($all_status$ahead_behind )]($style)'

# ── Languages / Runtimes ─────────────────────────────────────
[c]
symbol = ""
style = "fg:black bg:orange"
format = '[ $symbol( $version) ]($style)'

[golang]
symbol = ""
style = "fg:black bg:orange"
format = '[ $symbol( $version) ]($style)'

[haskell]
symbol = ""
style = "fg:black bg:orange"
format = '[ $symbol( $version) ]($style)'

[java]
symbol = ""
style = "fg:black bg:orange"
format = '[ $symbol( $version) ]($style)'

[kotlin]
symbol = ""
style = "fg:black bg:orange"
format = '[ $symbol( $version) ]($style)'

[nodejs]
symbol = ""
style = "fg:black bg:orange"
format = '[ $symbol( $version) ]($style)'

[php]
symbol = ""
style = "fg:black bg:orange"
format = '[ $symbol( $version) ]($style)'

[python]
symbol = ""
style = "fg:black bg:orange"
format = '[ $symbol( $version)(\(#$virtualenv\)) ]($style)'

[rust]
symbol = ""
style = "fg:black bg:orange"
format = '[ $symbol( $version) ]($style)'

# ── Time ─────────────────────────────────────────────────────
[time]
disabled = false
time_format = "%H:%M"
style = "fg:black bg:purple"
format = '[  $time ]($style)'

# ── Prompt Symbols ───────────────────────────────────────────
[line_break]
disabled = false

[character]
disabled = false
success_symbol = '[󰫈=󰇜󱗿󱃲󰛡](bold fg:green)'
error_symbol = '[󰫈=󰇜󰫊](bold fg:red)'
vimcmd_symbol = '[❮](bold fg:green)'
vimcmd_replace_one_symbol = '[❮](bold fg:purple)'
vimcmd_replace_symbol = '[❮](bold fg:purple)'
vimcmd_visual_symbol = '[❮](bold fg:yellow)'

# ── Command Duration ─────────────────────────────────────────
[cmd_duration]
min_time = 1000 # Show if the command took ≥ 1 second
show_milliseconds = false
format = '[󰇝  $duration ]($style)'
style = "fg:black bg:purple"
disabled = false
show_notifications = false
min_time_to_notify = 30000 # Notify if ≥ 30 seconds

# ── Color Palettes ───────────────────────────────────────────
# Custom palette optimized for dark backgrounds
[palettes.linked_data_dark_rainbow]
black = "#000000"
white = "#ffffff"
red = "#ff4d4d"
orange = "#ffb86c"
yellow = "#ffec99"
green = "#44f373"
cyan = "#7fffd4"
blue = "#68d5ff"
purple = "#c6a7ff"
